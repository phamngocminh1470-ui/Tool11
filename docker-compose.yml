version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: studyos-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studyos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: studyos-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: studyos-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/studyos
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-jwt-key-studyos-ai-2026-development
      - ENV=development
    depends_on:
      - db
      - redis
    volumes:
      - backend_uploads:/workspace/storage_uploads

  frontend:
    build: ./frontend
    container_name: studyos-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
